<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MISP Practice Lab</title>
<style>
:root{
  --navy:#0b2836; --navy-2:#123246; --navy-3:#173f56;
  --accent:#2e97d4; --accent-dark:#1f77ab;
  --bg:#eef2f4; --panel:#ffffff; --border:#d7dee2;
  --text:#233238; --muted:#7c8a90;
  --high:#c9302c; --medium:#e08e0b; --low:#c7a600; --undef:#5a6b70;
  --green:#3c9a40; --red:#c9302c; --amber:#c98a00; --white:#8a9096;
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
a{color:var(--accent-dark);text-decoration:none;cursor:pointer;}
a:hover{text-decoration:underline;}

/* ---- top navbar (real MISP uses a full-width dark navbar with dropdowns, not a sidebar) ---- */
#navbar{background:var(--navy);color:#cfe3ec;display:flex;align-items:center;padding:0 10px;height:44px;position:relative;z-index:300;box-shadow:0 1px 3px rgba(0,0,0,.2);}
#navbar .brand{font-weight:700;font-size:15px;color:#fff;padding:0 16px 0 6px;letter-spacing:.4px;white-space:nowrap;}
#navbar .brand span{color:var(--accent);}
.nb-item{position:relative;height:44px;display:flex;align-items:center;}
.nb-link{padding:0 12px;height:44px;display:flex;align-items:center;color:#cfe3ec;cursor:pointer;font-size:12.5px;white-space:nowrap;}
.nb-link:hover, .nb-item.open .nb-link{background:var(--navy-2);color:#fff;}
.nb-link.active{background:var(--navy-3);color:#fff;box-shadow:inset 0 -2px 0 var(--accent);}
.nb-caret{font-size:9px;margin-left:4px;opacity:.7;}
.nb-menu{position:absolute;top:44px;left:0;background:#fff;border:1px solid var(--border);border-radius:0 0 4px 4px;min-width:210px;box-shadow:0 6px 16px rgba(0,0,0,.18);display:none;flex-direction:column;padding:5px 0;}
.nb-item.open .nb-menu{display:flex;}
.nb-menu a{padding:7px 14px;color:var(--text);font-size:12.5px;}
.nb-menu a:hover{background:#f2f6f8;text-decoration:none;}
.nb-menu .nb-sep{border-top:1px solid var(--border);margin:5px 0;}
#navbar .spacer{flex:1;}
#navbar .nb-search{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:3px;padding:5px 10px;color:#fff;font-size:12.5px;width:230px;}
#navbar .nb-search::placeholder{color:#a9c2cc;}
#navbar .nb-user{display:flex;align-items:center;gap:8px;padding:0 12px;color:#cfe3ec;font-size:12px;white-space:nowrap;}
.avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10.5px;flex-shrink:0;}
#instance-strip{background:#f3d9a8;color:#6b4c06;font-size:11px;padding:3px 14px;text-align:center;}

#main{padding:18px 22px;max-width:1180px;margin:0 auto;}

/* ---- generic ---- */
h1.page-title{font-size:19px;margin:0 0 4px;font-weight:600;}
.subtle{color:var(--muted);font-size:12px;margin-bottom:14px;}
.btn{display:inline-block;padding:6px 12px;border-radius:3px;border:1px solid var(--accent-dark);background:var(--accent);color:#fff;font-size:12.5px;cursor:pointer;}
.btn:hover{background:var(--accent-dark);}
.btn.secondary{background:#fff;color:var(--text);border-color:var(--border);}
.btn.secondary:hover{background:#f2f5f6;}
.btn.danger{background:var(--red);border-color:#a02622;}
.btn.small{padding:3px 8px;font-size:11.5px;}
.btn[disabled]{opacity:.5;cursor:not-allowed;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:14px 16px;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;background:#fff;}
th{background:#f6f8f9;text-align:left;padding:7px 9px;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);letter-spacing:.3px;}
td{padding:7px 9px;border-bottom:1px solid #eef1f2;font-size:12.5px;vertical-align:middle;}
tr:hover td{background:#f8fbfc;}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;}
.tag{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10.5px;margin:1px 3px 1px 0;color:#fff;font-weight:600;}
.badge-outline{display:inline-block;padding:1px 7px;border:1px solid var(--border);border-radius:3px;font-size:10.5px;color:var(--muted);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:14px;text-align:left;}
.stat-num{font-size:26px;font-weight:700;color:var(--navy);}
.stat-label{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.banner{padding:8px 12px;border-radius:3px;font-size:12px;margin-bottom:12px;}
.banner.info{background:#e7f3fa;border:1px solid #b9dcee;color:#20586f;}
.banner.warn{background:#fdf3e3;border:1px solid #f0d99a;color:#7a5c07;}
.banner.lock{background:#f2f2f2;border:1px solid #ddd;color:#666;}
.toast-wrap{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{background:#233238;color:#fff;padding:9px 14px;border-radius:4px;font-size:12.5px;box-shadow:0 3px 10px rgba(0,0,0,.2);max-width:320px;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.tab{padding:7px 14px;font-size:12.5px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;}
.tab.active{color:var(--navy);border-color:var(--accent);font-weight:600;}

/* modal */
#modal-overlay{position:fixed;inset:0;background:rgba(10,20,25,.45);display:none;align-items:flex-start;justify-content:center;z-index:500;padding:40px 16px;overflow-y:auto;}
#modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:5px;width:520px;max-width:100%;padding:18px 20px;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.modal h2{font-size:16px;margin:0 0 12px;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.field input[type=text],.field select,.field textarea{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:3px;font-size:12.5px;font-family:inherit;}
.field textarea{resize:vertical;min-height:50px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
.checkbox-row{display:flex;align-items:center;gap:6px;font-size:12.5px;}

/* practice drawer */
#practice-btn{position:fixed;right:0;top:50%;transform:translateY(-50%) rotate(-90deg);transform-origin:right center;background:var(--accent);color:#fff;padding:8px 16px;border-radius:4px 4px 0 0;font-size:12.5px;font-weight:600;cursor:pointer;z-index:400;letter-spacing:.3px;}
#practice-drawer{position:fixed;top:0;right:-380px;width:380px;height:100%;background:#fff;border-left:1px solid var(--border);box-shadow:-4px 0 14px rgba(0,0,0,.12);transition:right .25s ease;z-index:450;display:flex;flex-direction:column;}
#practice-drawer.open{right:0;}
.pd-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--navy);color:#fff;}
.pd-head b{font-size:14px;}
.pd-close{cursor:pointer;font-size:18px;line-height:1;color:#cfe3ec;}
.pd-body{flex:1;overflow-y:auto;padding:12px 14px;}
.pd-level{margin-bottom:14px;}
.pd-level-head{display:flex;justify-content:space-between;font-size:11.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.4px;}
.lesson{border:1px solid var(--border);border-radius:4px;padding:9px 10px;margin-bottom:7px;font-size:12px;}
.lesson.done{background:#f2faf2;border-color:#bfe3bf;}
.lesson-title{font-weight:600;display:flex;align-items:center;gap:6px;font-size:12.5px;}
.lesson-check{width:15px;height:15px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;}
.lesson.done .lesson-check{background:var(--green);border-color:var(--green);}
.lesson-desc{color:var(--muted);margin-top:3px;font-size:11.5px;}
.lesson-hint{margin-top:5px;font-size:11px;color:var(--accent-dark);cursor:pointer;}
.progress-bar{height:6px;background:#eaeef0;border-radius:3px;overflow:hidden;margin-top:4px;}
.progress-bar > div{height:100%;background:var(--accent);}

.locked-note{font-size:11px;color:var(--muted);font-style:italic;}
pre.export{background:#0c2d3d;color:#bcefc4;padding:12px;border-radius:4px;font-size:11px;overflow-x:auto;max-height:340px;}
.empty{padding:30px;text-align:center;color:var(--muted);}
.corr-box{background:#fdf7e6;border:1px solid #eedca0;padding:10px 12px;border-radius:4px;font-size:12px;margin-top:10px;}
.attr-value{font-family:Consolas,monospace;font-size:12px;}
.celebrate-modal{width:460px;text-align:center;padding:28px 24px;}
.celebrate-modal .big-emoji{font-size:46px;margin-bottom:6px;}
.celebrate-modal h2{font-size:20px;margin:4px 0 6px;}
.celebrate-modal .sub{color:var(--muted);font-size:12.5px;margin-bottom:16px;}
.celebrate-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.celebrate-stats .cs{background:#f6f8f9;border:1px solid var(--border);border-radius:4px;padding:10px 4px;}
.celebrate-stats .cs b{display:block;font-size:18px;color:var(--navy);}
.celebrate-stats .cs span{font-size:10.5px;color:var(--muted);text-transform:uppercase;}
.confetti-piece{position:absolute;top:-12px;width:8px;height:14px;opacity:.9;animation:confetti-fall linear forwards;}
@keyframes confetti-fall{to{transform:translateY(420px) rotate(540deg);opacity:0;}}
#confetti-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;border-radius:5px;}
.pd-complete-banner{background:linear-gradient(135deg,#1f77ab,#2e97d4);color:#fff;border-radius:5px;padding:12px 14px;margin-bottom:14px;text-align:center;font-size:12.5px;}
.pd-complete-banner b{display:block;font-size:14px;margin-bottom:2px;}
.pd-complete-banner a{color:#fff;text-decoration:underline;font-size:11.5px;}
.pd-reset{display:block;width:100%;text-align:center;margin-top:6px;font-size:11px;color:var(--muted);cursor:pointer;padding:8px 0;}

.feed-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--border);border-radius:4px;margin-bottom:8px;}
.feed-name{font-weight:600;font-size:13px;}
.feed-meta{color:var(--muted);font-size:11px;margin-top:2px;}
.switch{width:34px;height:18px;border-radius:10px;background:#ccd3d6;position:relative;cursor:pointer;display:inline-block;flex-shrink:0;}
.switch.on{background:var(--green);}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s;}
.switch.on::after{left:18px;}
</style>
</head>
<body>
<div id="navbar">
  <div class="brand">MISP <span>Practice Lab</span></div>
  <div id="nav-items" style="display:flex;align-items:center;height:44px;"></div>
  <div class="spacer"></div>
  <input type="text" class="nb-search" id="global-search" placeholder="Search attributes, events, IOCs..." onkeydown="if(event.key==='Enter')doSearch()">
  <div class="nb-user"><div class="avatar">YO</div> analyst@your-org.lab</div>
</div>
<div id="instance-strip">🧪 Practice instance — simulated data only, nothing here leaves your browser</div>
<div id="main"></div>

<div id="practice-btn" onclick="togglePractice()">🎓 Practice Mode</div>
<div id="practice-drawer">
  <div class="pd-head"><b>Practice: Beginner → Expert</b><span class="pd-close" onclick="togglePractice()">✕</span></div>
  <div class="pd-body" id="pd-body"></div>
</div>

<div id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div class="toast-wrap" id="toast-wrap"></div>

<script>
/* ============ REFERENCE DATA ============ */
const REF = {
  categories: ["Internal reference","Payload delivery","Artifacts dropped","Payload installation","Persistence mechanism","Network activity","Payload type","Attribution","External analysis","Financial fraud","Other"],
  types: ["md5","sha1","sha256","filename","ip-src","ip-dst","domain","hostname","url","email-src","email-dst","mutex","regkey","comment","text","AS","vulnerability"],
  tags: [
    {n:"tlp:white", c:"#8a9096"}, {n:"tlp:green", c:"#3c9a40"}, {n:"tlp:amber", c:"#c98a00"}, {n:"tlp:red", c:"#c9302c"},
    {n:'type:OSINT', c:"#0c5f82"}, {n:'workflow:state="incomplete"', c:"#666"},
    {n:'misp-galaxy:threat-actor="Lazarus Group"', c:"#3b5b92"}, {n:'misp-galaxy:malware="Emotet"', c:"#7a4fa3"}
  ],
  galaxies: [
    {name:"Threat Actor", clusters:["APT28","APT29","Lazarus Group","FIN7"]},
    {name:"Malware", clusters:["Emotet","TrickBot","Cobalt Strike","QakBot"]},
    {name:"Attack Pattern (MITRE ATT&CK)", clusters:["T1566 Phishing","T1059 Command & Scripting Interpreter","T1071 Application Layer Protocol"]}
  ],
  objectTemplates: [
    {name:"file", attrs:[{type:"filename",category:"Payload delivery"},{type:"md5",category:"Payload delivery"},{type:"sha256",category:"Payload delivery"}]},
    {name:"domain-ip", attrs:[{type:"domain",category:"Network activity"},{type:"ip-dst",category:"Network activity"}]}
  ],
  orgs: ["Your Organisation","CIRCL","ACME-CERT","Nordic-SOC","Global-ISAC"],
  distributions: ["Your organisation only","This community only","Connected communities","All communities","Sharing group"],
  threatLevels: ["High","Medium","Low","Undefined"],
  analysisLevels: ["Initial","Ongoing","Completed"],
  feeds: [
    {id:"f1", name:"CIRCL OSINT Feed", provider:"CIRCL", url:"https://www.circl.lu/doc/misp/feed-osint", enabled:true},
    {id:"f2", name:"abuse.ch URLhaus", provider:"abuse.ch", url:"https://urlhaus.abuse.ch", enabled:false},
    {id:"f3", name:"Botvrij.eu IOC feed", provider:"Botvrij.eu", url:"https://www.botvrij.eu", enabled:false},
    {id:"f4", name:"MalwareBazaar recent samples", provider:"abuse.ch", url:"https://bazaar.abuse.ch", enabled:false}
  ],
  warninglists: [
    {name:"List of known RFC 1918 (private) IPv4 addresses", count:17, desc:"Prevents flagging internal/private IP ranges as malicious indicators."},
    {name:"List of known Google domains", provider:"CIRCL", count:412, desc:"Avoids false-positives on common Google infrastructure."},
    {name:"List of known top 10000 Alexa domains", count:10000, desc:"Reduces noise from very common, benign domains."},
    {name:"List of known Microsoft domains", count:238, desc:"Filters legitimate Microsoft/O365 infrastructure."}
  ]
};
const THREAT_COLOR = {High:"var(--high)",Medium:"var(--medium)",Low:"var(--low)",Undefined:"var(--undef)"};

const FEED_EVENT_POOL = [
  {info:"New QakBot loader delivered via malicious Excel macros", threatLevel:"High", attrs:[
    {category:"Payload delivery",type:"filename",value:"invoice_08234.xlsm",ids:false},
    {category:"Network activity",type:"domain",value:"cdn-assets-update[.]net",ids:true}]},
  {info:"MalwareBazaar: new Cobalt Strike beacon sample", threatLevel:"Medium", attrs:[
    {category:"Payload delivery",type:"sha256",value:"9f2b7e1c4a5d6f7089ab12cd34ef56ab77889900aabbccddeeff00112233445",ids:true}]},
  {info:"URLhaus: phishing kit hosting IP flagged", threatLevel:"Medium", attrs:[
    {category:"Network activity",type:"ip-dst",value:"45.155.205.14",ids:true},
    {category:"Network activity",type:"url",value:"http://secure-mail-verify[.]top/login",ids:true}]},
  {info:"Botvrij.eu: TrickBot C2 node reported", threatLevel:"High", attrs:[
    {category:"Network activity",type:"ip-dst",value:"193.106.191.202",ids:true}]}
];

function seedEvents(){
  return [
    {id:1001, uuid:"a1b2c3d4-...-e001", info:"Emotet campaign targeting EU banks", orgc:"CIRCL", date:"2026-06-20",
     threatLevel:"High", analysis:"Completed", distribution:"All communities", published:true, locked:true,
     tags:['type:OSINT','tlp:white','misp-galaxy:malware="Emotet"'],
     attributes:[
       {id:1,category:"Payload delivery",type:"md5",value:"a3f5c9e0b8d1f2334455667788990011",ids:true,sightings:14},
       {id:2,category:"Network activity",type:"ip-dst",value:"185.220.101.7",ids:true,sightings:9},
       {id:3,category:"Network activity",type:"domain",value:"update-billing-secure.com",ids:true,sightings:5}
     ], galaxies:['Malware: Emotet'], objects:[]},
    {id:1002, uuid:"a1b2c3d4-...-e002", info:"Lazarus Group spear-phishing against defense contractors", orgc:"Nordic-SOC", date:"2026-06-25",
     threatLevel:"High", analysis:"Ongoing", distribution:"Connected communities", published:true, locked:true,
     tags:['tlp:amber','misp-galaxy:threat-actor="Lazarus Group"'],
     attributes:[
       {id:4,category:"Payload delivery",type:"filename",value:"Q3_Contract_Review.docm",ids:false,sightings:2},
       {id:5,category:"Network activity",type:"url",value:"http://hxxp-defense-portal-login.net/verify",ids:true,sightings:3}
     ], galaxies:['Threat Actor: Lazarus Group'], objects:[]},
    {id:1003, uuid:"a1b2c3d4-...-e003", info:"Suspected Cobalt Strike C2 infrastructure", orgc:"ACME-CERT", date:"2026-06-29",
     threatLevel:"Medium", analysis:"Initial", distribution:"This community only", published:false, locked:true,
     tags:['tlp:red'],
     attributes:[
       {id:6,category:"Network activity",type:"ip-dst",value:"91.242.217.19",ids:true,sightings:1}
     ], galaxies:[], objects:[]},
    {id:1004, uuid:"a1b2c3d4-...-e004", info:"FIN7 skimmer script found on compromised e-commerce sites", orgc:"Global-ISAC", date:"2026-06-30",
     threatLevel:"Medium", analysis:"Completed", distribution:"All communities", published:true, locked:true,
     tags:['tlp:green','misp-galaxy:threat-actor="FIN7"'],
     attributes:[
       {id:7,category:"Artifacts dropped",type:"filename",value:"jquery-analytics.min.js",ids:false,sightings:6},
       {id:8,category:"Network activity",type:"domain",value:"cdn-stat-track.net",ids:true,sightings:4}
     ], galaxies:['Threat Actor: FIN7'], objects:[]}
  ];
}

/* ============ STATE ============ */
let state = {
  view:"dashboard", currentEventId:null,
  events: seedEvents(),
  nextEventId: 1005, nextAttrId: 100,
  feeds: JSON.parse(JSON.stringify(REF.feeds)),
  sharingGroups: [],
  flags:{visitedEventIndex:false, visitedCorrelation:false, exportedEvent:false, visitedGalaxies:false, visitedTaxonomies:false,
         visitedAttrIndex:false, visitedWarninglists:false, visitedGraph:false, fetchedFeed:false, celebrationShown:false,
         freetextImported:false, filteredEventIndex:false, sawWarninglistMatch:false, visitedDecay:false,
         proposalSubmitted:false, visitedAutomation:false, deletedEventOnce:false}
};

async function loadState(){
  try{
    const raw = localStorage.getItem("misp-lab-progress");
    if(raw){
      const saved = JSON.parse(raw);
      if(saved.userEvents) state.events = state.events.concat(saved.userEvents);
      if(saved.flags) state.flags = Object.assign(state.flags, saved.flags);
      if(saved.nextEventId) state.nextEventId = saved.nextEventId;
      if(saved.nextAttrId) state.nextAttrId = saved.nextAttrId;
      if(saved.feeds) state.feeds = saved.feeds;
      if(saved.sharingGroups) state.sharingGroups = saved.sharingGroups;
    }
  }catch(e){ console.warn("could not load saved progress", e); }
  render(); renderPractice();
}
let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      const userEvents = state.events.filter(e=>!e.locked);
      localStorage.setItem("misp-lab-progress", JSON.stringify({userEvents, flags:state.flags, nextEventId:state.nextEventId, nextAttrId:state.nextAttrId, feeds:state.feeds, sharingGroups:state.sharingGroups}));
    }catch(e){ console.warn("progress not saved", e); toast("⚠ Could not save progress in this browser"); }
  }, 300);
}

/* ============ LESSONS ============ */
const LESSONS = [
  {level:"Beginner", id:"b1", title:"Find your way to the Event Index", desc:"Open Event Actions → List Events from the top navbar.",
   hint:"Top navbar → Event Actions → List Events.", check:s=>s.flags.visitedEventIndex},
  {level:"Beginner", id:"b2", title:"Create your first event", desc:"Click 'Add Event' and fill in the event info, threat level, and distribution.",
   hint:"Top navbar → Event Actions → Add Event.", check:s=>s.events.some(e=>!e.locked)},
  {level:"Beginner", id:"b3", title:"Add an attribute", desc:"Open your event and add at least one attribute (an indicator such as an IP or hash).",
   hint:"Inside an event, click 'Add Attribute'.", check:s=>s.events.some(e=>!e.locked && e.attributes.length>=1)},
  {level:"Beginner", id:"b4", title:"Tag your event", desc:"Apply a tag (e.g. a TLP marking) to classify sharing/sensitivity.",
   hint:"Inside an event, click 'Add Tag' near the top.", check:s=>s.events.some(e=>!e.locked && e.tags.length>=1)},
  {level:"Beginner", id:"b5", title:"Publish the event", desc:"Publish your event so it becomes visible to the community (this simulates the real publish email alert).",
   hint:"Click the 'Publish Event' button inside the event.", check:s=>s.events.some(e=>!e.locked && e.published)},
  {level:"Beginner", id:"b6", title:"Browse the global Attribute Index", desc:"Every attribute across every event can be searched from one place — open it.",
   hint:"Top navbar → Event Actions → List Attributes.", check:s=>s.flags.visitedAttrIndex},
  {level:"Beginner", id:"b7", title:"Filter the Event Index", desc:"Narrow the event list down using the tag or organisation filter controls.",
   hint:"On List Events, use the filter dropdowns above the table.", check:s=>s.flags.filteredEventIndex},
  {level:"Beginner", id:"b8", title:"Use Free-text Import", desc:"Paste a blob of raw text (like an email or report) and let MISP auto-extract IOCs from it.",
   hint:"Inside your event, click 'Free-text Import', paste some IPs/domains, then Extract & Add.", check:s=>s.flags.freetextImported},
  {level:"Beginner", id:"b9", title:"Tag an individual attribute", desc:"Tags aren't just for events — a single attribute can carry its own tag too.",

function computeStats(){
  const byLevel={Beginner:[0,0],Intermediate:[0,0],Expert:[0,0]};
  LESSONS.forEach(l=>{byLevel[l.level][1]++; if(l.check(state)) byLevel[l.level][0]++;});
  return byLevel;
}

/* ============ UTIL ============ */
function esc(s){return (s+"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function toast(msg){
  const w=document.getElementById("toast-wrap");
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  w.appendChild(t); setTimeout(()=>t.remove(),3500);
}
function tagPill(tagName){
  const ref = REF.tags.find(t=>t.n===tagName);
  const color = ref? ref.c : "#555";
  return `<span class="tag" style="background:${color}">${esc(tagName)}</span>`;
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("show");}
function openModalHTML(html){document.getElementById("modal-content").innerHTML=html; document.getElementById("modal-overlay").classList.add("show");}

/* ============ NAVBAR (dropdowns, matches real MISP top nav) ============ */
const NAVBAR = [
  {label:"Home", view:"dashboard"},
  {label:"Event Actions", items:[
    {label:"List Events", view:"eventIndex"},
    {label:"Add Event", action:"showAddEventModal()"},
    {label:"List Attributes", view:"attrIndex"},
    {label:"Sightings", view:"sightings"}
  ]},
  {label:"Galaxies", view:"galaxies"},
  {label:"Input Filters", items:[
    {label:"Warninglists", view:"warninglists"},
    {label:"Taxonomies", view:"taxonomies"}
  ]},
  {label:"Global Actions", items:[
    {label:"Organisations", view:"organisations"},
    {label:"Feeds", view:"feeds"},
    {label:"Sharing Groups", view:"sharingGroups"},
    {label:"Automation", view:"automation"},
    {label:"Sync Servers", view:"admin", note:true}
  ]},
  {label:"Administration", items:[
    {label:"List Users", view:"admin", note:true},
    {label:"List Roles", view:"admin", note:true},
    {label:"Server Settings", view:"admin", note:true}
  ]}
];
let openMenu=null;
function toggleMenu(i){
  openMenu = openMenu===i? null : i;
  renderNav();
}
document.addEventListener("click", (ev)=>{
  if(!ev.target.closest(".nb-item")){ if(openMenu!==null){openMenu=null; renderNav();} }
});
function renderNav(){
  let html="";
  NAVBAR.forEach((entry,i)=>{
    if(entry.view && !entry.items){
      html += `<div class="nb-item"><div class="nb-link ${state.view===entry.view?'active':''}" onclick="nav('${entry.view}')">${entry.label}</div></div>`;
    } else {
      html += `<div class="nb-item ${openMenu===i?'open':''}">
        <div class="nb-link" onclick="event.stopPropagation();toggleMenu(${i})">${entry.label}<span class="nb-caret">▾</span></div>
        <div class="nb-menu">${entry.items.map(it=>{
          if(it.action) return `<a onclick="closeAllMenus();${it.action}">${it.label}</a>`;
          return `<a onclick="closeAllMenus();nav('${it.view}'${it.note?",true":""})">${it.label}</a>`;
        }).join("")}</div>
      </div>`;
    }
  });
  document.getElementById("nav-items").innerHTML = html;
}
function closeAllMenus(){ openMenu=null; }

function nav(view, isAdminNote){
  state.view=view;
  if(view==="eventIndex") state.flags.visitedEventIndex=true;
  if(view==="galaxies") state.flags.visitedGalaxies=true;
  if(view==="taxonomies") state.flags.visitedTaxonomies=true;
  if(view==="attrIndex") state.flags.visitedAttrIndex=true;
  if(view==="warninglists") state.flags.visitedWarninglists=true;
  if(view==="automation") state.flags.visitedAutomation=true;
  render(); renderPractice(); saveState();
}
function openEvent(id){ state.currentEventId=id; state.view="eventView"; render(); renderPractice(); }

/* ============ RENDER ROOT ============ */
function render(){
  renderNav();
  const m=document.getElementById("main");
  if(state.view==="dashboard") m.innerHTML=viewDashboard();
  else if(state.view==="eventIndex") m.innerHTML=viewEventIndex();
  else if(state.view==="eventView") m.innerHTML=viewEventDetail(state.currentEventId);
  else if(state.view==="organisations") m.innerHTML=viewOrgs();
  else if(state.view==="galaxies") m.innerHTML=viewGalaxies();
  else if(state.view==="taxonomies") m.innerHTML=viewTaxonomies();
  else if(state.view==="attrIndex") m.innerHTML=viewAttrIndex();
  else if(state.view==="sightings") m.innerHTML=viewSightings();
  else if(state.view==="feeds") m.innerHTML=viewFeeds();
  else if(state.view==="warninglists") m.innerHTML=viewWarninglists();
  else if(state.view==="sharingGroups") m.innerHTML=viewSharingGroups();
  else if(state.view==="automation") m.innerHTML=viewAutomation();
  else if(state.view==="admin") m.innerHTML=viewAdmin();
}

/* ============ DASHBOARD ============ */

  const totalEvents = state.events.length;
  const orgs = new Set(state.events.map(e=>e.orgc)).size;
  const correlations = Object.values(state.events.reduce((acc,e)=>{e.attributes.forEach(a=>{acc[a.value]=(acc[a.value]||0)+1;});return acc;},{})).filter(c=>c>1).length;
  return `
  <h1 class="page-title">Dashboard</h1>
  <div class="subtle">Welcome back, analyst@your-org.lab — here's what's happening on this instance.</div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">${totalEvents}</div><div class="stat-label">Events</div></div>
    <div class="stat-card"><div class="stat-num">${totalAttrs}</div><div class="stat-label">Attributes</div></div>
    <div class="stat-card"><div class="stat-num">${orgs}</div><div class="stat-label">Organisations</div></div>
    <div class="stat-card"><div class="stat-num">${correlations}</div><div class="stat-label">Correlations</div></div>
  </div>
  <div class="card">
    <b>Recent Activity</b>
    <table style="margin-top:8px">
      <tr><th>Event</th><th>Org</th><th>Threat Level</th><th>Status</th></tr>
      ${state.events.slice().reverse().slice(0,6).map(e=>`
        <tr onclick="openEvent(${e.id})" style="cursor:pointer">
          <td>#${e.id} ${esc(e.info)}</td><td>${esc(e.orgc)}</td>
          <td><span class="pill" style="background:${THREAT_COLOR[e.threatLevel]}">${e.threatLevel}</span></td>
          <td>${e.published?'<span class="badge-outline" style="color:var(--green);border-color:var(--green)">Published</span>':'<span class="badge-outline">Draft</span>'}</td>
        </tr>`).join("")}
    </table>
  </div>
  <div class="banner info">New to MISP? Open <b>Practice Mode</b> on the right edge of the screen for a guided beginner → expert path (${LESSONS.length} lessons).</div>
  `;
}

/* ============ EVENT INDEX ============ */
let evFilterTag = "";
let evFilterOrg = "";
function viewEventIndex(){
  const allTags = Array.from(new Set(state.events.flatMap(e=>e.tags)));
  let rows = state.events.slice().reverse();
  if(evFilterTag) rows = rows.filter(e=>e.tags.includes(evFilterTag));
  if(evFilterOrg) rows = rows.filter(e=>e.orgc===evFilterOrg);
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div><h1 class="page-title">Event Index</h1><div class="subtle">${rows.length} of ${state.events.length} events shown</div></div>
    <button class="btn" onclick="showAddEventModal()">➕ Add Event</button>
  </div>
  <div class="card" style="display:flex;gap:14px;align-items:flex-end;padding:12px 16px;">
    <div><label style="display:block;font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase">Filter by tag</label>
      <select onchange="evFilterTag=this.value;filterEventIndex()" style="padding:5px 8px;border:1px solid var(--border);border-radius:3px;font-size:12px">
        <option value="">All tags</option>
        ${allTags.map(t=>`<option value="${esc(t)}" ${evFilterTag===t?'selected':''}>${esc(t)}</option>`).join("")}
      </select></div>
    <div><label style="display:block;font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase">Filter by org</label>
      <select onchange="evFilterOrg=this.value;filterEventIndex()" style="padding:5px 8px;border:1px solid var(--border);border-radius:3px;font-size:12px">
        <option value="">All organisations</option>
        ${REF.orgs.map(o=>`<option value="${esc(o)}" ${evFilterOrg===o?'selected':''}>${esc(o)}</option>`).join("")}
      </select></div>
    ${(evFilterTag||evFilterOrg)?`<button class="btn small secondary" onclick="evFilterTag='';evFilterOrg='';filterEventIndex()">Clear filters</button>`:''}
  </div>
  <table>
    <tr><th>ID</th><th>Owner Org</th><th>Info</th><th>Tags</th><th>#Attr</th><th>Threat</th><th>Distribution</th><th>Date</th><th>Status</th></tr>
    ${rows.length? rows.map(e=>`
      <tr onclick="openEvent(${e.id})" style="cursor:pointer">
        <td>#${e.id}</td>
        <td>${esc(e.orgc)}</td>
        <td>${esc(e.info)} ${e.locked?'<span class="locked-note">(read-only)</span>':''}</td>
        <td>${e.tags.map(tagPill).join(" ")}</td>
        <td>${e.attributes.length}</td>
        <td><span class="pill" style="background:${THREAT_COLOR[e.threatLevel]}">${e.threatLevel}</span></td>
        <td>${esc(e.distribution)}</td>
        <td>${esc(e.date)}</td>
        <td>${e.published?'✅ Published':'⬜ Draft'}</td>
      </tr>`).join("") : `<tr><td colspan="9" class="empty">No events match this filter.</td></tr>`}
  </table>
  `;
}
function filterEventIndex(){
  if(evFilterTag || evFilterOrg) state.flags.filteredEventIndex = true;
  document.getElementById("main").innerHTML = viewEventIndex();
  renderPractice(); saveState();
}

/* ============ GLOBAL ATTRIBUTE INDEX ============ */
function viewAttrIndex(){
  const rows=[];
  state.events.forEach(e=>e.attributes.forEach(a=>rows.push({e,a})));
  rows.sort((x,y)=>y.e.id-x.e.id);
  return `
  <h1 class="page-title">Attribute Index</h1>
  <div class="subtle">Every attribute across every event on this instance — ${rows.length} total.</div>
  <table>
    <tr><th>Event</th><th>Category</th><th>Type</th><th>Value</th><th>IDS</th><th>Sightings</th></tr>
    ${rows.map(r=>`
      <tr onclick="openEvent(${r.e.id})" style="cursor:pointer">
        <td>#${r.e.id} ${esc(r.e.info)}</td><td>${esc(r.a.category)}</td><td>${esc(r.a.type)}</td>
        <td class="attr-value">${esc(r.a.value)}</td>
        <td>${r.a.ids?'<span class="badge-outline" style="color:var(--green);border-color:var(--green)">IDS</span>':'—'}</td>
        <td>${r.a.sightings||0}</td>
      </tr>`).join("")}
  </table>`;
}

/* ============ SIGHTINGS ============ */
function viewSightings(){
  const rows=[];
  state.events.forEach(e=>e.attributes.forEach(a=>{ if((a.sightings||0)>0) rows.push({e,a}); }));
  rows.sort((x,y)=>(y.a.sightings||0)-(x.a.sightings||0));
  return `
  <h1 class="page-title">Sightings</h1>
  <div class="subtle">Sightings show how often an indicator has been seen in the wild or in your own environment — useful for prioritizing what's actively active.</div>
  <table>
    <tr><th>Value</th><th>Type</th><th>Event</th><th>Sighting count</th><th></th></tr>
    ${rows.length? rows.map(r=>`
      <tr>
        <td class="attr-value">${esc(r.a.value)}</td><td>${esc(r.a.type)}</td>
        <td onclick="openEvent(${r.e.id})" style="cursor:pointer">#${r.e.id} ${esc(r.e.info)}</td>
        <td><b>${r.a.sightings||0}</b></td>
        <td>${!r.e.locked?`<button class="btn small secondary" onclick="addSighting(${r.e.id},${r.a.id})">+ Sight</button>`:''}</td>
      </tr>`).join("") : `<tr><td colspan="5" class="empty">No sightings recorded yet. Open an event and click 'Sight' on an attribute.</td></tr>`}
  </table>`;
}
function addSighting(eventId, attrId){
  const e = state.events.find(x=>x.id===eventId);
  const a = e.attributes.find(x=>x.id===attrId);
  a.sightings = (a.sightings||0)+1;
  a._sightedByYou = true;
  toast("Sighting recorded for "+a.value);
  render(); renderPractice(); saveState();
}

/* ============ FEEDS ============ */
function viewFeeds(){
  return `
  <h1 class="page-title">Feeds</h1>
  <div class="subtle">External OSINT feeds this instance can automatically ingest. Enable a feed, then fetch it to pull in new events.</div>
  ${state.feeds.map(f=>`
    <div class="feed-row">
      <div>
        <div class="feed-name">${esc(f.name)}</div>
        <div class="feed-meta">${esc(f.provider)} · ${esc(f.url)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn small secondary" ${f.enabled?'':'disabled'} onclick="fetchFeed('${f.id}')">Fetch Now</button>
        <div class="switch ${f.enabled?'on':''}" onclick="toggleFeed('${f.id}')"></div>
      </div>
    </div>`).join("")}
  `;
}
function toggleFeed(id){
  const f = state.feeds.find(x=>x.id===id);
  f.enabled = !f.enabled;
  toast(f.name+" "+(f.enabled?"enabled":"disabled"));
  render(); saveState();
}
function fetchFeed(id){
  const f = state.feeds.find(x=>x.id===id);
  if(!f.enabled) return;
  const pick = FEED_EVENT_POOL[Math.floor(Math.random()*FEED_EVENT_POOL.length)];
  const ev = {
    id: state.nextEventId++, uuid:"feed-"+Date.now(), info: pick.info, orgc: f.provider,
    date: new Date().toISOString().slice(0,10), threatLevel: pick.threatLevel, analysis:"Initial",
    distribution:"All communities", published:true, locked:true, tags:['type:OSINT'],
    attributes: pick.attrs.map(a=>({id:state.nextAttrId++, category:a.category, type:a.type, value:a.value, ids:a.ids, sightings:0})),
    galaxies:[], objects:[]
  };
  state.events.push(ev);
  state.flags.fetchedFeed = true;
  toast("📥 Fetched new event #"+ev.id+" from "+f.name);
  render(); renderPractice(); saveState();
}

function viewCorrelations(id){
  state.flags.visitedCorrelation=true;
  const e = state.events.find(x=>x.id===id);
  const values = {};
  state.events.forEach(ev=>ev.attributes.forEach(a=>{ (values[a.value]=values[a.value]||[]).push(ev.id); }));
  const hits = e.attributes.filter(a=>values[a.value] && values[a.value].length>1);
  const area = document.getElementById("corr-area");
  if(!hits.length){
    area.innerHTML = `<div class="subtle" style="margin-top:8px">No correlations found — this attribute value doesn't appear in any other event yet. Try reusing a value (e.g. same IP or hash) across two events.</div>`;
  } else {
    area.innerHTML = `<div class="corr-box">🔗 Found ${hits.length} correlated attribute(s):<br>` +
      hits.map(h=>`<div style="margin-top:4px">${esc(h.type)} <span class="attr-value">${esc(h.value)}</span> also appears in event(s): ${values[h.value].filter(x=>x!==id).map(x=>'#'+x).join(", ")}</div>`).join("") + `</div>`;
  }
  renderPractice(); saveState();
}

function viewGraph(id){
  state.flags.visitedGraph=true;
  const e = state.events.find(x=>x.id===id);
  const nodes = [];
  e.attributes.forEach(a=>nodes.push({label:a.type+": "+a.value, kind:"attr"}));
  e.objects.forEach(o=>nodes.push({label:"[obj] "+o.name, kind:"obj"}));
  const cx=260, cy=140, r=100;
  const area = document.getElementById("graph-area");
  if(!nodes.length){
    area.innerHTML = `<div class="subtle" style="margin-top:8px">Nothing to graph yet — add attributes or objects to this event first.</div>`;
    renderPractice(); saveState(); return;
  }
  let svg = `<svg viewBox="0 0 520 280" width="100%" height="280" style="margin-top:8px;background:#fbfcfd;border:1px solid var(--border);border-radius:4px">`;
  svg += `<circle cx="${cx}" cy="${cy}" r="26" fill="#0c2d3d"/><text x="${cx}" y="${cy+4}" fill="#fff" font-size="10" text-anchor="middle">#${e.id}</text>`;
  nodes.forEach((n,i)=>{
    const angle = (2*Math.PI*i/nodes.length) - Math.PI/2;
    const x = cx + r*Math.cos(angle), y = cy + r*Math.sin(angle);
    const color = n.kind==="obj" ? "#7a4fa3" : "#2e97d4";
    svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#c7d2d6" stroke-width="1.5"/>`;
    svg += `<circle cx="${x}" cy="${y}" r="7" fill="${color}"/>`;
    const labelX = x + (x>cx? 10: -10);
    svg += `<text x="${labelX}" y="${y+3}" font-size="9.5" fill="#233238" text-anchor="${x>cx?'start':'end'}">${esc(n.label.length>28? n.label.slice(0,28)+'…' : n.label)}</text>`;
  });
  svg += `</svg>`;
  area.innerHTML = svg;
  renderPractice(); saveState();
}

function doSearch(){
  const q = document.getElementById("global-search").value.trim().toLowerCase();
  if(!q) return;
  const hits=[];
  state.events.forEach(e=>{
    if(e.info.toLowerCase().includes(q)) hits.push({e,match:"event info"});
    e.attributes.forEach(a=>{ if(a.value.toLowerCase().includes(q)) hits.push({e,match:`attribute: ${a.value}`}); });
  });
  state.view="dashboard"; render();
  const m=document.getElementById("main");
  m.innerHTML = `<h1 class="page-title">Search results for "${esc(q)}"</h1>` +
    (hits.length? `<table><tr><th>Event</th><th>Match</th></tr>${hits.map(h=>`<tr style="cursor:pointer" onclick="openEvent(${h.e.id})"><td>#${h.e.id} ${esc(h.e.info)}</td><td>${esc(h.match)}</td></tr>`).join("")}</table>` : `<div class="empty">No matches. Try a value you added as an attribute.</div>`);

const WARNINGLIST_PATTERNS = [/^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/, /^192\.168\.\d{1,3}\.\d{1,3}$/, /^172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3}$/, /^127\.0\.0\.1$/];
function matchesWarninglist(value){ return WARNINGLIST_PATTERNS.some(p=>p.test(value.trim())); }
function submitAddAttribute(eventId){
  const value = document.getElementById("f-value").value.trim();
  if(!value){ toast("Value is required"); return; }
  const e = state.events.find(x=>x.id===eventId);
  e.attributes.push({id: state.nextAttrId++, category: document.getElementById("f-cat").value, type: document.getElementById("f-type").value, value, ids: document.getElementById("f-ids").checked, sightings:0, tags:[]});
  closeModal();
  if(matchesWarninglist(value)){
    state.flags.sawWarninglistMatch = true;
    toast("⚠ "+value+" matches warninglist 'RFC 1918 private IP' — likely a false positive");
  } else {
    toast("Attribute added to event #"+eventId);
  }
  render(); renderPractice(); saveState();
}
function removeAttribute(eventId, attrId){
  const e = state.events.find(x=>x.id===eventId);

  const text = document.getElementById("f-freetext").value;
  const found = [];
  (text.match(/\b\d{1,3}(?:\.\d{1,3}){3}\b/g)||[]).forEach(v=>found.push({category:"Network activity",type:"ip-dst",value:v}));
  (text.match(/\b[a-fA-F0-9]{64}\b/g)||[]).forEach(v=>found.push({category:"Payload delivery",type:"sha256",value:v}));
  (text.match(/\b[a-fA-F0-9]{40}\b/g)||[]).forEach(v=>found.push({category:"Payload delivery",type:"sha1",value:v}));
  (text.match(/\b[a-fA-F0-9]{32}\b/g)||[]).forEach(v=>found.push({category:"Payload delivery",type:"md5",value:v}));
  (text.match(/\bhttps?:\/\/[^\s,]+/g)||[]).forEach(v=>found.push({category:"Network activity",type:"url",value:v}));
  (text.match(/\b(?:[a-z0-9-]+\.)+[a-z]{2,}\b/gi)||[]).forEach(v=>{
    if(!found.some(f=>f.value===v) && !/^\d/.test(v)) found.push({category:"Network activity",type:"domain",value:v});
  });
  if(!found.length){ toast("No recognizable IOCs found in that text"); return; }
  const e = state.events.find(x=>x.id===eventId);
  found.forEach(f=>e.attributes.push({id:state.nextAttrId++, category:f.category, type:f.type, value:f.value, ids:true, sightings:0, tags:[]}));
  state.flags.freetextImported = true;
  closeModal(); toast("Imported "+found.length+" attribute(s) via free-text"); render(); renderPractice(); saveState();
}

/* ============ DECAY SCORES ============ */
function viewDecay(eventId){
  state.flags.visitedDecay = true;
  const e = state.events.find(x=>x.id===eventId);
  const area = document.getElementById("decay-area");
  if(!e.attributes.length){
    area.innerHTML = `<div class="subtle" style="margin-top:8px">No attributes to score yet.</div>`;
  } else {
    const daysOld = Math.max(1, Math.round((Date.now() - new Date(e.date).getTime())/86400000));
    const rows = e.attributes.map(a=>{
      const score = Math.max(0, Math.min(100, 100 - daysOld*2 + (a.sightings||0)*8));
      const color = score>=70? "var(--green)" : score>=35? "var(--medium)" : "var(--high)";
      return `<tr><td class="attr-value">${esc(a.value)}</td><td>${esc(a.type)}</td><td><b style="color:${color}">${score}</b> / 100</td></tr>`;
    }).join("");
    area.innerHTML = `<table style="margin-top:8px"><tr><th>Value</th><th>Type</th><th>Decay Score</th></tr>${rows}</table>
      <div class="subtle" style="margin-top:6px">Score drops with age and rises with fresh sightings — a rough model of how confidence in an indicator fades over time.</div>`;
  }
  renderPractice(); saveState();
}

/* ============ PRACTICE DRAWER ============ */
function togglePractice(){ document.getElementById("practice-drawer").classList.toggle("open"); }
function renderPractice(){
  const stats = computeStats();
  const levels = ["Beginner","Intermediate","Expert"];
  const totalDone = LESSONS.filter(l=>l.check(state)).length;
  const allDone = totalDone === LESSONS.length;

  let html = "";
  if(allDone){
    html += `<div class="pd-complete-banner"><b>🏆 All ${LESSONS.length} challenges complete!</b>You've covered the full MISP analyst workflow.</div>`;
  }
  levels.forEach(lv=>{
    const [done,total]=stats[lv];
    html += `<div class="pd-level">
      <div class="pd-level-head"><span>${lv}</span><span>${done}/${total}</span></div>
      <div class="progress-bar"><div style="width:${total?Math.round(done/total*100):0}%"></div></div>
      <div style="margin-top:8px">`;
    LESSONS.filter(l=>l.level===lv).forEach(l=>{
      const done = l.check(state);
      html += `<div class="lesson ${done?'done':''}">
        <div class="lesson-title"><span class="lesson-check">${done?'✓':''}</span>${esc(l.title)}</div>
        <div class="lesson-desc">${esc(l.desc)}</div>
        <div class="lesson-hint" onclick="toast('${l.hint.replace(/'/g,"\\'")}')">💡 hint</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="pd-reset" onclick="confirmReset()">↺ Reset my progress and start over</div>`;
  document.getElementById("pd-body").innerHTML = html;

  if(allDone && !state.flags.celebrationShown){
    state.flags.celebrationShown = true;
    saveState();
    showCelebration();
  }
}

/* ============ CELEBRATION + CERTIFICATE ============ */
function labStats(){
  const own = state.events.filter(e=>!e.locked);
  const attrs = own.reduce((n,e)=>n+e.attributes.length,0);
  const sightings = state.events.reduce((n,e)=>n+e.attributes.reduce((m,a)=>m+(a.sightings||0),0),0);
  return { events: own.length, attributes: attrs, feedsFetched: state.events.filter(e=>e.locked && e.uuid && e.uuid.startsWith("feed-")).length, sightings };
}
function showCelebration(){
  const s = labStats();
  openModalHTML(`
    <div class="celebrate-modal" style="position:relative;overflow:hidden">
      <div id="confetti-layer"></div>
      <div class="big-emoji">🎉</div>
      <h2>Congratulations — you finished all the challenges!</h2>
      <div class="sub">You completed all ${LESSONS.length} lessons across Beginner, Intermediate, and Expert.</div>
      <div class="celebrate-stats">
        <div class="cs"><b>${s.events}</b><span>Events built</span></div>
        <div class="cs"><b>${s.attributes}</b><span>Attributes added</span></div>
        <div class="cs"><b>${LESSONS.length}/${LESSONS.length}</b><span>Lessons done</span></div>
      </div>
      <button class="btn" onclick="closeModal()">Keep exploring</button>
    </div>
  `);
  spawnConfetti();
  toast("🎉 All "+LESSONS.length+" MISP challenges complete!");
}
function spawnConfetti(){
  const layer = document.getElementById("confetti-layer");
  if(!layer) return;
  const colors = ["#2e97d4","#3c9a40","#e08e0b","#c9302c","#c98a00","#7a4fa3"];
  for(let i=0;i<50;i++){
    const p = document.createElement("div");
    p.className="confetti-piece";
    p.style.left = Math.random()*100+"%";
    p.style.background = colors[i%colors.length];
    p.style.animationDuration = (1.4+Math.random()*1.2)+"s";
    p.style.animationDelay = (Math.random()*0.4)+"s";
    layer.appendChild(p);
  }
}

/* ============ RESET ============ */
function confirmReset(){
  openModalHTML(`
    <h2>Reset progress?</h2>
    <div class="subtle">This clears every event you've created and resets all ${LESSONS.length} lessons back to zero. The read-only reference events stay. This can't be undone.</div>
    <div class="modal-actions"><button class="btn secondary" onclick="closeModal()">Cancel</button><button class="btn danger" onclick="doReset()">Reset everything</button></div>
  `);
}
function doReset(){
  state.events = seedEvents();
  state.nextEventId = 1005; state.nextAttrId = 100;
  state.feeds = JSON.parse(JSON.stringify(REF.feeds));
  state.sharingGroups = [];
  state.flags = {visitedEventIndex:false, visitedCorrelation:false, exportedEvent:false, visitedGalaxies:false, visitedTaxonomies:false,
         visitedAttrIndex:false, visitedWarninglists:false, visitedGraph:false, fetchedFeed:false, celebrationShown:false,
         freetextImported:false, filteredEventIndex:false, sawWarninglistMatch:false, visitedDecay:false,
         proposalSubmitted:false, visitedAutomation:false, deletedEventOnce:false};
  try{ localStorage.removeItem("misp-lab-progress"); }catch(e){}
  closeModal(); nav("dashboard"); toast("Progress reset — starting fresh");
}
